<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
		div .card-1{
			background-color: #2ecc71;
		}

		#bad-boss{
			border: 10px solid purple;
			transform: rotate(5deg);
		}

		.container .card-3{
			opacity: 0.3;
		}
	</style>
	<link rel="stylesheet" href="task1.css">
</head>
<body>
	<h1 class="title">⚔️ CSS ARENA</h1>
	<p class="subtitle">Система повреждена. Исправь визуальные глитчи</p>

	<div class="container">

		<div class="card card-1">
			<img src="https://picsum.photos/300/200?random=1" alt="#">
			<p>Восстанови мой цвет рамки</p>
		</div>

		<div class="card" id="bad-boss">
			<img src="https://picsum.photos/300/200?random=2" alt="#">
			<p>Верни мне стабильную форму</p>
		</div>

		<div class="card card-3">
			<img src="https://picsum.photos/300/200?random=3" alt="#">
			<p>Сделай меня видимым полностью</p>
		</div>

		<div class="card card-4" style="background: black; color: black;">
			<img src="https://picsum.photos/300/200?random=4" alt="#">
			<p>Вытащи меня из темноты</p>
		</div>
	</div>
</body>
</html>
