<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Испытание: Дом с привидениями</title>
	<link rel="stylesheet" href="setting1.css">
	<link rel="stylesheet" href="task1.css">
</head>

<body>
	<section class="house-section" id="attic">
		<h2 class="section-title">🕸️ Чердак</h2>
		<div class="attic-row">
			<div class="ghost big-ghost">👻</div>
			<div class="ghost small-ghost">👻</div>
			<div class="ghost rare-ghost">💀</div>
			<div class="ghost tiny-ghost">👻</div>
			<div class="ghost evil-ghost">😈</div>
			<div class="ghost small-ghost">👻</div>
		</div>
	</section>

	<section class="house-section" id="hall">
		<h2 class="section-title">🕯️ Парадный зал</h2>
		<div class="hall-row">
			<div class="item candle">🕯️</div>
			<div class="item portrait">🖼️</div>
			<div class="item candle">🕯️</div>
			<div class="item cauldron">🪄</div>
			<div class="item skull">💀</div>
		</div>
	</section>

	<section class="house-section" id="basement">
		<h2 class="section-title">⚰️ Подвал</h2>
		<div class="basement">
			<div class="basement-row shelf-top">
				<div class="item potion-r">🧪</div>
				<div class="item potion-g">🧪</div>
				<div class="item potion-b">🧪</div>
			</div>
			<div class="basement-row coffins">
				<div class="item coffin-small">⚰️</div>
				<div class="item coffin-big">⚰️</div>
				<div class="item coffin-small">⚰️</div>
			</div>
			<div class="basement-row shelf-bot">
				<div class="item rat">🐀</div>
				<div class="item spider">🕷️</div>
			</div>
		</div>
	</section>
</body>

</html>
